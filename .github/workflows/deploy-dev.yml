# Deploy to dev (template)
name: Deploy Dev
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Terraform Init
        run: cd infra/terraform && terraform init
      - name: Terraform Apply
        run: cd infra/terraform && terraform apply -auto-approve -var-file=environments/dev.tfvars
      # - name: Deploy App (placeholder)
      #   run: echo "Deploying app..."
