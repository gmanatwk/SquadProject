# Deploy to staging (template)
name: Deploy Staging
on:
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Terraform Init
        run: cd infra/terraform && terraform init
      - name: Terraform Apply
        run: cd infra/terraform && terraform apply -auto-approve -var-file=environments/staging.tfvars
      # - name: Deploy App (placeholder)
      #   run: echo "Deploying app..."
